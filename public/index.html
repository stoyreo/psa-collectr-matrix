<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Card Investment Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #222;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        header {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .summary-card .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .summary-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .section {
            margin-bottom: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .section-title {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            border-left: 4px solid #667eea;
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            border-bottom: 2px solid #ddd;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        tr:hover {
            background: #fafafa;
        }
        .action-buy {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .action-hold {
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .action-sell {
            background: #ffebee;
            color: #c62828;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 16px;
        }
        .error {
            background: #ffebee;
            color: #d32f2f;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pokémon Card Investment Matrix</h1>
            <p class="subtitle">Quantitative analysis: BUY decision matrix + ACTION engine</p>
            <div class="timestamp" id="timestamp">Loading...</div>
        </header>

        <div class="summary-cards" id="summaryCards">
            <div class="loading">Loading portfolio data...</div>
        </div>

        <div class="section">
            <div class="section-title">Action Engine (BUY/HOLD/SELL)</div>
            <table id="actionTable">
                <thead>
                    <tr>
                        <th>Card</th>
                        <th>Action</th>
                        <th>Confidence</th>
                        <th>Score</th>
                        <th>Underval %</th>
                        <th>Demand</th>
                    </tr>
                </thead>
                <tbody id="actionTableBody">
                    <tr><td colspan="6" class="loading">Loading data...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        async function loadMatrix() {
            try {
                const response = await fetch('/api/matrix');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                if (data.status === 'error') {
                    showError(data.message);
                    return;
                }

                renderMatrix(data);
            } catch (error) {
                showError(`Failed to load matrix: ${error.message}`);
            }
        }

        function renderMatrix(data) {
            // Summary cards
            const summary = data.summary;
            const summaryHtml = `
                <div class="summary-card">
                    <div class="label">Total Cards</div>
                    <div class="value">${summary.total_cards}</div>
                </div>
                <div class="summary-card">
                    <div class="label">BUY Signal</div>
                    <div class="value" style="color: #2e7d32;">${summary.buy_count}</div>
                </div>
                <div class="summary-card">
                    <div class="label">HOLD Signal</div>
                    <div class="value" style="color: #1976d2;">${summary.hold_count}</div>
                </div>
                <div class="summary-card">
                    <div class="label">SELL Signal</div>
                    <div class="value" style="color: #d32f2f;">${summary.sell_count}</div>
                </div>
            `;
            document.getElementById('summaryCards').innerHTML = summaryHtml;

            // Timestamp
            const dt = new Date(data.timestamp);
            document.getElementById('timestamp').textContent = 'Generated: ' + dt.toLocaleString();

            // Action table
            let actionHtml = '';
            data.matrix.slice(0, 10).forEach(card => {
                const action = card.action;
                const actionClass = action === 'BUY' ? 'action-buy' : action === 'HOLD' ? 'action-hold' : 'action-sell';
                actionHtml += `
                    <tr>
                        <td>${card.card}</td>
                        <td><span class="${actionClass}">${action}</span></td>
                        <td>${Math.round(card.confidence)}%</td>
                        <td><strong>${card.buy_score}/10</strong></td>
                        <td>${card.undervaluation_pct.toFixed(1)}%</td>
                        <td><strong>${card.demand}</strong></td>
                    </tr>
                `;
            });
            document.getElementById('actionTableBody').innerHTML = actionHtml;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        // Load matrix on page load
        window.addEventListener('DOMContentLoaded', loadMatrix);
    </script>
</body>
</html>
